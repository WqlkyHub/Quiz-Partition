<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>♪ Piano Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1c1c1e;
  --bg2:     #242426;
  --bg3:     #2e2e30;
  --bg4:     #161618;
  --text:    #e8e4dc;
  --text2:   #a09a90;
  --text3:   #585854;
  --accent:  #e8e4dc;
  --line:    #2e2e30;
  --line2:   #383834;
  --correct: #52b788;
  --correct-bg: #1b3a2a;
  --wrong:   #e07070;
  --wrong-bg:#3a1c1c;
  --reveal:  #52b788;
  --reveal-bg:#1b3a2a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg);}

/* HEADER */
.header{
  background:var(--bg2);border-bottom:1px solid var(--line);
  padding:13px 16px;display:grid;
  grid-template-columns:40px 1fr 40px;
  align-items:center;flex-shrink:0;
}
.header h1{font-family:"Syne",sans-serif;font-size:16px;font-weight:700;color:var(--text);text-align:center;letter-spacing:-0.3px;}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:6px;}
.pill{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:400;color:var(--text3);background:var(--bg4);border:1px solid var(--line);border-radius:20px;padding:3px 8px;}
.pill strong{color:var(--text2);font-weight:500;}

/* TABS */
.level-tabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.level-tabs::-webkit-scrollbar{display:none;}
.level-tab{padding:10px 13px;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:400;color:var(--text3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color 0.2s;}
.level-tab.active{color:var(--text);border-bottom-color:var(--text2);}

/* PROGRESS */
.progress-wrap{height:1px;background:var(--bg3);flex-shrink:0;}
.progress-fill{height:100%;background:var(--text2);transition:width 0.4s ease;}

/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 20px;display:flex;flex-direction:column;gap:14px;}

.question-label{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:300;color:var(--text3);text-align:center;letter-spacing:0.3px;}
canvas.staff-canvas{width:100%;height:auto;display:block;border-radius:10px;background:var(--bg4);border:1px solid var(--line);}

/* CLEF BADGE */
.clef-badge{
  display:flex;align-items:center;gap:8px;justify-content:center;
  font-family:"DM Sans",sans-serif;font-size:11px;font-weight:400;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);
  margin-bottom:4px;
}
.clef-symbol{font-size:18px;line-height:1;color:var(--text2);}

/* NOTE BUTTONS */
.answer-section{display:flex;flex-direction:column;gap:10px;}
.sub-label{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:400;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-bottom:2px;}
.note-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.note-btn{
  font-family:"DM Sans",sans-serif;font-size:13px;font-weight:400;
  color:var(--text2);background:var(--bg2);border:1px solid var(--line);
  border-radius:9px;padding:0;height:50px;cursor:pointer;
  transition:background 0.1s,transform 0.08s;touch-action:manipulation;
}
.note-btn:active{transform:scale(0.92);background:var(--bg3);}
.note-btn.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);font-weight:500;}
.note-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong);}
.note-btn.reveal{background:var(--reveal-bg);border-color:var(--reveal);color:var(--reveal);font-weight:500;}
.note-btn:disabled{cursor:default;}

/* FEEDBACK */
.feedback-area{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;padding-bottom:8px;}
.feedback-text{font-family:"DM Sans",sans-serif;font-size:13px;font-weight:300;color:var(--text2);min-height:20px;letter-spacing:0.1px;}
.next-btn{
  display:none;font-family:"Syne",sans-serif;font-size:14px;font-weight:600;
  color:var(--bg);background:var(--text);border:none;border-radius:28px;
  padding:14px 36px;cursor:pointer;touch-action:manipulation;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
  transition:transform 0.08s,opacity 0.15s;
}
.next-btn:active{transform:scale(0.96);}

/* VERTICAL STAFF */
.place-instr{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;}
.place-instr strong{color:var(--text);display:block;font-size:32px;margin-top:4px;}
.vertical-staff-wrap{display:flex;flex-direction:row;align-items:stretch;width:100%;min-height:420px;}
.vstaff-canvas-col{flex:1;position:relative;}
canvas.vstaff{display:block;width:100%;height:100%;cursor:crosshair;border-radius:12px;border:1px solid var(--line);}
.vstaff-labels{display:none;}
.vstaff-tap-hint{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:300;color:var(--text3);text-align:center;letter-spacing:0.2px;}

/* HOME SCREENS */
#level-screen,#home-screen{
  position:fixed;inset:0;z-index:99;max-width:480px;margin:0 auto;
  background:var(--bg);display:flex;flex-direction:column;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:opacity 0.3s ease,transform 0.3s ease;
}
#home-screen{z-index:100;}
#level-screen.hidden,#home-screen.hidden{opacity:0;transform:translateY(20px);pointer-events:none;}

.home-hero{
  background:var(--bg2);border-bottom:1px solid var(--line);
  padding:52px 28px 40px;text-align:center;flex-shrink:0;
}
.home-clef{font-size:80px;line-height:1;color:var(--text2);margin-bottom:16px;display:block;}
.home-title{font-family:"Syne",sans-serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px;}
.home-subtitle{font-family:"DM Sans",sans-serif;font-size:14px;font-weight:300;color:var(--text3);line-height:1.6;letter-spacing:0.1px;}
.home-body{padding:24px 20px 36px;display:flex;flex-direction:column;gap:14px;flex:1;}
.home-section-title{font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}

.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.home-stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;}
.home-stat-val{font-family:"Syne",sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.home-stat-lbl{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:300;color:var(--text3);margin-top:4px;letter-spacing:0.2px;}

.home-start-btn{
  font-family:"Syne",sans-serif;font-size:15px;font-weight:700;
  color:var(--bg);background:var(--text);border:none;border-radius:28px;
  padding:16px;width:100%;cursor:pointer;touch-action:manipulation;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:transform 0.1s;
}
.home-start-btn:active{transform:scale(0.97);}

.level-cards{display:flex;flex-direction:column;gap:8px;}
.level-card{
  display:flex;align-items:center;gap:14px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:14px 16px;
  cursor:pointer;transition:background 0.12s,transform 0.08s;touch-action:manipulation;
}
.level-card:active{transform:scale(0.98);background:var(--bg3);}
.level-card-icon{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:10px;flex-shrink:0;}
.level-card-text{flex:1;}
.level-card-name{font-family:"Syne",sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.level-card-desc{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:300;color:var(--text3);line-height:1.4;}
.level-card-arrow{font-size:16px;color:var(--text3);flex-shrink:0;}

.home-back-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 0;color:var(--text2);touch-action:manipulation;display:none;justify-self:start;}
.piano-hint{font-family:"DM Sans",sans-serif;font-size:11px;font-weight:300;color:var(--text3);text-align:center;margin-bottom:8px;letter-spacing:0.2px;}
</style>
</head>
<body>
<!-- ÉCRAN 1 : Accueil -->
<div id="home-screen">
  <div class="home-hero">
    <span class="home-clef">𝄞</span>
    <div class="home-title">Piano Quiz</div>
    <div class="home-subtitle">Entraîne ton oreille et ton œil<br>à reconnaître les notes</div>
  </div>
  <div class="home-body">
    <div class="home-section-title">Mes stats</div>
    <div class="home-stats">
      <div class="home-stat">
        <div class="home-stat-val" id="home-total-score">0</div>
        <div class="home-stat-lbl">Dernier score</div>
      </div>
      <div class="home-stat">
        <div class="home-stat-val" id="home-best-streak">0</div>
        <div class="home-stat-lbl">Meilleure série 🔥</div>
      </div>
    </div>
    <button class="home-start-btn" id="home-start-btn">Commencer →</button>
  </div>
</div>

<!-- ÉCRAN 2 : Choix exercice -->
<div id="level-screen" class="hidden">
  <div class="home-hero" style="padding:36px 28px 28px;">
    <div class="home-title" style="font-size:22px;">Choisis ton exercice</div>
    <div class="home-subtitle">Sélectionne un niveau pour commencer</div>
  </div>
  <div class="home-body" style="padding-top:16px;">
    <div class="level-cards" id="home-level-cards"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <button class="home-back-btn" id="home-back-btn">←</button>
    <h1>Piano Quiz</h1>
    <div class="header-right">
      <div class="pill"><strong id="score-display">0</strong></div>
      <div class="pill">🔥 <strong id="streak-display">0</strong></div>
    </div>
  </div>
  <div class="level-tabs" id="level-tabs"></div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
  <div class="main" id="main-scroll">
    <div class="question-label" id="question-label"></div>
    <div id="staff-container"></div>
    <div class="answer-section" id="answer-section"></div>
    <div class="feedback-area">
      <div class="feedback-text" id="feedback-text"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>
  </div>
</div>

<script>
const TREBLE=[
  {name:'Do4',label:'Do',pos:0},{name:'Ré4',label:'Ré',pos:0.5},
  {name:'Mi4',label:'Mi',pos:1},{name:'Fa4',label:'Fa',pos:1.5},
  {name:'Sol4',label:'Sol',pos:2},{name:'La4',label:'La',pos:2.5},
  {name:'Si4',label:'Si',pos:3},{name:'Do5',label:'Do',pos:3.5},
  {name:'Ré5',label:'Ré',pos:4},{name:'Mi5',label:'Mi',pos:4.5},
  {name:'Fa5',label:'Fa',pos:5},{name:'Sol5',label:'Sol',pos:5.5},
  {name:'La5',label:'La',pos:6},
];
const BASS=[
  {name:'Mi2',label:'Mi',pos:0},{name:'Fa2',label:'Fa',pos:0.5},
  {name:'Sol2',label:'Sol',pos:1},{name:'La2',label:'La',pos:1.5},
  {name:'Si2',label:'Si',pos:2},{name:'Do3',label:'Do',pos:2.5},
  {name:'Ré3',label:'Ré',pos:3},{name:'Mi3',label:'Mi',pos:3.5},
  {name:'Fa3',label:'Fa',pos:4},{name:'Sol3',label:'Sol',pos:4.5},
  {name:'La3',label:'La',pos:5},{name:'Si3',label:'Si',pos:5.5},
  {name:'Do4',label:'Do',pos:6},
];
const ALL_LABELS=['Do','Ré','Mi','Fa','Sol','La','Si'];
const LEVELS=[
  {id:0,label:'① Note',desc:'Note simple, clé aléatoire'},
  {id:1,label:'② Accord',desc:'Plusieurs notes empilées'},
  {id:2,label:'③ Clavier',desc:'Portée → touche piano'},
  {id:3,label:'④ Placer',desc:'Placer la note sur la portée'},
  {id:4,label:'⑤ Oreille',desc:'Note jouée → identifier'},
];
const LEVEL_META=[
  {icon:'𝄞',name:'Identifier la note',desc:'Une note apparaît — dis son nom. Clé de Sol ou Fa au hasard.'},
  {icon:'🎵',name:'Accord',desc:'2 ou 3 notes empilées à identifier de bas en haut.'},
  {icon:'🎹',name:'Clavier',desc:'Vois la note sur la portée, trouve la bonne touche. Sans indices.'},
  {icon:'✏️',name:'Placer la note',desc:'Un nom de note — place-le au bon endroit sur la portée.'},
  {icon:'👂',name:'Oreille',desc:'Une note est jouée — identifie-la sur le clavier, sans la voir.'},
];

let state={level:0,score:0,streak:0,total:0,answered:false,currentQ:null};
let bestStreak=0, lastScore=0;
const rand=arr=>arr[Math.floor(Math.random()*arr.length)];

// ── AUDIO ────────────────────────────────────────────────────────────────────
const NOTE_FREQ={
  'Do4':261.63,'Ré4':293.66,'Mi4':329.63,'Fa4':349.23,'Sol4':392.00,'La4':440.00,'Si4':493.88,
  'Do5':523.25,'Ré5':587.33,'Mi5':659.25,'Fa5':698.46,'Sol5':783.99,'La5':880.00,'Si5':987.77,
  'Mi2':82.41,'Fa2':87.31,'Sol2':98.00,'La2':110.00,'Si2':123.47,
  'Do3':130.81,'Ré3':146.83,'Mi3':164.81,'Fa3':174.61,'Sol3':196.00,'La3':220.00,'Si3':246.94,
};
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playNote(noteName,duration=0.9){
  try{
    const ctx=getAudioCtx(); const freq=NOTE_FREQ[noteName]; if(!freq) return;
    const now=ctx.currentTime;
    const harmonics=[{mult:1,gain:0.6},{mult:2,gain:0.25},{mult:3,gain:0.10},{mult:4,gain:0.05},{mult:6,gain:0.02}];
    const master=ctx.createGain();
    master.gain.setValueAtTime(0,now);
    master.gain.linearRampToValueAtTime(0.35,now+0.008);
    master.gain.exponentialRampToValueAtTime(0.18,now+0.12);
    master.gain.exponentialRampToValueAtTime(0.001,now+duration);
    master.connect(ctx.destination);
    harmonics.forEach(h=>{
      const osc=ctx.createOscillator(); const g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq*h.mult; g.gain.value=h.gain;
      osc.connect(g); g.connect(master); osc.start(now); osc.stop(now+duration);
    });
  }catch(e){}
}
function soundCorrect(n){playNote(n,1.1);}
function soundWrong(){
  try{
    const ctx=getAudioCtx(); const now=ctx.currentTime;
    const osc=ctx.createOscillator(); const g=ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(120,now);
    osc.frequency.exponentialRampToValueAtTime(60,now+0.18);
    g.gain.setValueAtTime(0.22,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
    osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.22);
  }catch(e){}
}
function soundReveal(n){setTimeout(()=>playNote(n,1.2),350);}

// ── DESSIN PORTÉE HORIZONTALE ────────────────────────────────────────────────
const H_TOP=32, H_SP=12, H_NR=6, H_LEFT=56, H_CH=130, DPR=window.devicePixelRatio||1;
function hPY(pos){return H_TOP+(5-pos)*H_SP;}

function initHC(canvas){
  // Remonter jusqu'au premier parent avec une largeur réelle
  let el=canvas.parentElement;
  while(el && el.clientWidth===0) el=el.parentElement;
  const W=(el?el.clientWidth:0)||document.getElementById('main-scroll').clientWidth||340;
  canvas.width=W*DPR; canvas.height=H_CH*DPR;
  canvas.style.height=H_CH+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(DPR,DPR);
  return {ctx,W};
}

function drawLines(ctx,W){
  const col='#383834';
  ctx.strokeStyle=col; ctx.lineWidth=0.5;
  [1,2,3,4,5].forEach(p=>{const y=hPY(p);ctx.beginPath();ctx.moveTo(H_LEFT,y);ctx.lineTo(W-12,y);ctx.stroke();});
  ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(H_LEFT,hPY(5));ctx.lineTo(H_LEFT,hPY(1));ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-12,hPY(5));ctx.lineTo(W-12,hPY(1));ctx.stroke();
  return col;
}

function drawClef(ctx,clef){
  ctx.fillStyle='#e8e4dc';
  if(clef==='treble'){
    // 𝄞 : font 56px, queue en bas, spirale sur Sol4 (pos=2)
    // On cale la baseline sur la ligne du bas de la portée
    // pour que le glyphe s'étende vers le haut et couvre toute la portée
    // 𝄞 : centrage dynamique dans la zone 0..H_LEFT
    // 𝄞 : centré horizontalement, calé verticalement pour couvrir la portée
    ctx.font='58px serif';
    const gW=ctx.measureText('𝄞').width;
    const xG=Math.max(0,(H_LEFT-gW)/2);
    // La spirale doit être sur Sol4 (pos=2), la queue dépasse en bas
    // baseline empirique : milieu portée + décalage propre au glyphe
    const staffMid=(hPY(1)+hPY(5))/2;
    ctx.fillText('𝄞', xG, staffMid + 28);
  } else {
    // 𝄢 : font 36px, doit s'étendre entre ligne 3 et ligne 5
    // Centre du glyphe aligné sur Fa3 (pos=4, ligne 4)
    // 𝄢 : centrage dynamique comme 𝄞
    ctx.font='34px serif';
    const gWF=ctx.measureText('𝄢').width;
    const xF=Math.max(0,(H_LEFT-gWF)/2);
    ctx.fillText('𝄢', xF, hPY(3.5) + 8);
  }
}

function drawNote(ctx,pos,color,x){
  const y=hPY(pos);
  const lc='#585854'; ctx.strokeStyle=lc; ctx.lineWidth=0.8;
  if(pos<=0){const ly=hPY(0);ctx.beginPath();ctx.moveTo(x-H_NR-4,ly);ctx.lineTo(x+H_NR+4,ly);ctx.stroke();}
  if(pos>=6){const ly=hPY(6);ctx.beginPath();ctx.moveTo(x-H_NR-4,ly);ctx.lineTo(x+H_NR+4,ly);ctx.stroke();}
  // Hampe verticale parfaitement droite
  const up=pos<3.5;
  ctx.strokeStyle=color; ctx.lineWidth=1.4;
  if(up){ctx.beginPath();ctx.moveTo(x+H_NR-1,y);ctx.lineTo(x+H_NR-1,y-30);ctx.stroke();}
  else  {ctx.beginPath();ctx.moveTo(x-H_NR+1,y);ctx.lineTo(x-H_NR+1,y+30);ctx.stroke();}
  // Tête légèrement ovale, rotation douce
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(x,y,H_NR,H_NR*0.7,-0.2,0,Math.PI*2);ctx.fill();
}

function renderHStaff(canvas,notes,clef,colors){
  const {ctx,W}=initHC(canvas);
  ctx.clearRect(0,0,W,H_CH);
  ctx.fillStyle='#161618'; ctx.fillRect(0,0,W,H_CH);
  drawLines(ctx,W); drawClef(ctx,clef);
  const aS=H_LEFT+12, aE=W-16;
  notes.forEach((note,i)=>{
    const x=notes.length===1?aS+(aE-aS)/2:aS+i*(aE-aS)/Math.max(notes.length-1,1);
    const c=(colors&&colors[i])?colors[i]:'#e8e4dc';
    drawNote(ctx,note.pos,c,x);
  });
}

function renderHStaffChord(canvas,notes,clef,colors){
  const {ctx,W}=initHC(canvas);
  ctx.clearRect(0,0,W,H_CH);
  ctx.fillStyle='#161618'; ctx.fillRect(0,0,W,H_CH);
  drawLines(ctx,W); drawClef(ctx,clef);
  const aS2=H_LEFT+12, aE2=W-16; const x=aS2+(aE2-aS2)/2;
  const medPos=notes[Math.floor(notes.length/2)].pos;
  const forceUp=medPos<=3.5;
  const posMin=Math.min(...notes.map(n=>n.pos));
  const posMax=Math.max(...notes.map(n=>n.pos));
  // Hampe unique parfaitement verticale
  ctx.strokeStyle='#e8e4dc'; ctx.lineWidth=1.4;
  if(forceUp){
    ctx.beginPath();ctx.moveTo(x+H_NR-1,hPY(posMin));ctx.lineTo(x+H_NR-1,hPY(posMax)-30);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(x-H_NR+1,hPY(posMax));ctx.lineTo(x-H_NR+1,hPY(posMin)+30);ctx.stroke();
  }
  // Notes collées : les deux restent à gauche de la hampe
  // Note normale  : centre = x, son bord droit touche la hampe (x + H_NR = stemX)
  // Note déplacée : décalée de H_NR*2 vers la droite, son bord gauche touche la hampe
  const displaced=new Set();
  for(let i=0;i<notes.length-1;i++){
    if(Math.abs(notes[i+1].pos-notes[i].pos)===0.5) displaced.add(i+1);
  }
  notes.forEach((note,i)=>{
    const c=(colors&&colors[i])?colors[i]:'#e8e4dc';
    const y=hPY(note.pos);
    const nx = displaced.has(i) ? x + H_NR*2 : x;
    const lc='#585854'; ctx.strokeStyle=lc; ctx.lineWidth=0.8;
    if(note.pos<=0){const ly=hPY(0);ctx.beginPath();ctx.moveTo(nx-H_NR-4,ly);ctx.lineTo(nx+H_NR+4,ly);ctx.stroke();}
    if(note.pos>=6){const ly=hPY(6);ctx.beginPath();ctx.moveTo(nx-H_NR-4,ly);ctx.lineTo(nx+H_NR+4,ly);ctx.stroke();}
    ctx.fillStyle=c;
    ctx.beginPath();ctx.ellipse(nx,y,H_NR,H_NR*0.7,-0.2,0,Math.PI*2);ctx.fill();
  });
}

// ── PORTÉE VERTICALE ─────────────────────────────────────────────────────────
function buildVerticalStaff(container,q){
  const isTreble=q.clef!=='bass';
  const badge=document.createElement('div'); badge.className='clef-badge';
  badge.innerHTML=`<span class="clef-symbol">${isTreble?'𝄞':'𝄢'}</span>${isTreble?'Clé de Sol — main droite':'Clé de Fa — main gauche'}`;
  container.appendChild(badge);
  const instr=document.createElement('div'); instr.className='place-instr';
  instr.innerHTML=`Touche<strong>${q.targetNote.label}</strong>`;
  container.appendChild(instr);
  const hint=document.createElement('div'); hint.className='vstaff-tap-hint';
  hint.textContent='Touche la bonne ligne ou espace';
  container.appendChild(hint);
  const wrap=document.createElement('div'); wrap.className='vertical-staff-wrap';
  const col=document.createElement('div'); col.className='vstaff-canvas-col';
  const cv=document.createElement('canvas'); cv.className='vstaff'; cv.id='vstaff-cv';
  col.appendChild(cv); wrap.appendChild(col);
  container.appendChild(wrap);
  const POSITIONS=[];
  for(let p=6;p>=0;p-=0.5) POSITIONS.push(p);
  setTimeout(()=>{
    drawVStaff(cv,null,null,POSITIONS);
    cv.addEventListener('touchstart',e=>{e.preventDefault();handleVStaff(e,cv,q,POSITIONS,true);},{passive:false});
    cv.addEventListener('click',e=>handleVStaff(e,cv,q,POSITIONS,false));
  },40);
}

function drawVStaff(canvas,selectedPos,selectedColor,POSITIONS){
  const W=canvas.parentElement.clientWidth||200;
  const H=canvas.parentElement.clientHeight||420;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#161618'; ctx.fillRect(0,0,W,H);
  const n=POSITIONS.length, slotH=H/n, cx=W/2;
  function pI(pos){return Math.round((6-pos)*2);}
  function iY(idx){return(idx+0.5)*slotH;}
  ctx.strokeStyle='#383834'; ctx.lineWidth=0.8;
  [1,2,3,4,5].forEach(lp=>{const y=iY(pI(lp));ctx.beginPath();ctx.moveTo(12,y);ctx.lineTo(W-8,y);ctx.stroke();});
  ctx.lineWidth=0.5; ctx.setLineDash([4,3]);
  [0,6].forEach(lp=>{const y=iY(pI(lp));ctx.beginPath();ctx.moveTo(W*0.2,y);ctx.lineTo(W*0.8,y);ctx.stroke();});
  ctx.setLineDash([]);
  ctx.strokeStyle='#383834'; ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(cx,iY(pI(5)));ctx.lineTo(cx,iY(pI(1)));ctx.stroke();
  if(selectedPos!==null){
    const idx=pI(selectedPos), y=iY(idx), r=Math.min(slotH*0.38,W*0.18);
    if(selectedPos===0||selectedPos===6){
      ctx.strokeStyle='#383834'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(cx-r-6,y);ctx.lineTo(cx+r+6,y);ctx.stroke();
    }
    ctx.fillStyle=selectedColor||'#e8e4dc';
    ctx.beginPath();ctx.ellipse(cx,y,r,r*0.7,-0.2,0,Math.PI*2);ctx.fill();
    // Hampe verticale droite
    const up=selectedPos<3.5, stemLen=slotH*2.5;
    ctx.strokeStyle=selectedColor||'#e8e4dc'; ctx.lineWidth=1.8;
    if(up){ctx.beginPath();ctx.moveTo(cx+r-1,y);ctx.lineTo(cx+r-1,y-stemLen);ctx.stroke();}
    else  {ctx.beginPath();ctx.moveTo(cx-r+1,y);ctx.lineTo(cx-r+1,y+stemLen);ctx.stroke();}
  }
}

function drawExtraVNote(canvas,pos,color,POSITIONS){
  const W=canvas.width/DPR, H=canvas.height/DPR;
  const ctx=canvas.getContext('2d');
  const n=POSITIONS.length, slotH=H/n, cx=W/2;
  function pI(p){return Math.round((6-p)*2);}
  function iY(idx){return(idx+0.5)*slotH;}
  const idx=pI(pos), y=iY(idx), r=Math.min(slotH*0.38,W*0.18);
  ctx.save(); ctx.setTransform(DPR,0,0,DPR,0,0);
  if(pos===0||pos===6){
    ctx.strokeStyle='#383834'; ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(cx-r-6,y);ctx.lineTo(cx+r+6,y);ctx.stroke();
  }
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(cx,y,r,r*0.7,-0.2,0,Math.PI*2);ctx.fill();
  const up=pos<3.5, stemLen=slotH*2.5;
  ctx.strokeStyle=color; ctx.lineWidth=1.8;
  if(up){ctx.beginPath();ctx.moveTo(cx+r-1,y);ctx.lineTo(cx+r-1,y-stemLen);ctx.stroke();}
  else  {ctx.beginPath();ctx.moveTo(cx-r+1,y);ctx.lineTo(cx-r+1,y+stemLen);ctx.stroke();}
  ctx.restore();
}

function handleVStaff(e,cv,q,POSITIONS,isTouch){
  if(state.answered) return;
  const rect=cv.getBoundingClientRect();
  const clientY=isTouch?e.touches[0].clientY:e.clientY;
  const relY=clientY-rect.top, slotH=rect.height/POSITIONS.length;
  const idx=Math.max(0,Math.min(POSITIONS.length-1,Math.floor(relY/slotH)));
  const pos=POSITIONS[idx];
  const notePool=q.clef==='bass'?BASS:TREBLE;
  const found=notePool.find(n=>n.pos===pos);
  if(!found){showFeedback('Touche une ligne ou un espace !');return;}
  state.answered=true; state.total++;
  const correct=found.label===q.targetNote.label;
  const col=correct?'#52b788':'#e07070';
  drawVStaff(cv,pos,col,POSITIONS);
  if(correct){
    state.score+=15+state.streak*2; state.streak++;
    soundCorrect(found.name); showFeedback('✓ '+streakMsg());
  } else {
    setTimeout(()=>{drawVStaff(cv,pos,col,POSITIONS);drawExtraVNote(cv,q.targetNote.pos,'#52b788',POSITIONS);},350);
    state.streak=0; soundWrong(); soundReveal(q.targetNote.name);
    showFeedback(q.targetNote.label+' ('+q.targetNote.name+') est la bonne position.');
  }
  updateScore();
  document.getElementById('next-btn').style.display='inline-block';
  scrollToBottom();
}

// ── PIANO ─────────────────────────────────────────────────────────────────────
function buildPianoKeys(container,target,showLabels){
  const WK=[{label:'Do'},{label:'Ré'},{label:'Mi'},{label:'Fa'},{label:'Sol'},{label:'La'},{label:'Si'},
            {label:'Do'},{label:'Ré'},{label:'Mi'},{label:'Fa'},{label:'Sol'},{label:'La'},{label:'Si'}];
  const BK=[{ai:0},{ai:1},{ai:3},{ai:4},{ai:5},{ai:7},{ai:8},{ai:10},{ai:11},{ai:12}];
  const KW=26,KH=80,BKW=17,BKH=50, totalW=WK.length*KW;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${totalW} ${KH}`);
  svg.style.cssText='width:100%;height:auto;display:block;border-radius:8px;';
  WK.forEach((key,i)=>{
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',i*KW+0.5);rect.setAttribute('y',0.5);
    rect.setAttribute('width',KW-1);rect.setAttribute('height',KH-1);
    rect.setAttribute('rx',3);rect.setAttribute('fill','#e8e4dc');
    rect.setAttribute('stroke','#3a3834');rect.setAttribute('stroke-width','0.5');
    rect.setAttribute('data-label',key.label);rect.style.cursor='pointer';
    rect.addEventListener('click',()=>handlePianoClick(key.label,target,svg));
    svg.appendChild(rect);
    if(showLabels){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',i*KW+KW/2);txt.setAttribute('y',KH-5);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','6.5');
      txt.setAttribute('fill','#888');txt.setAttribute('pointer-events','none');
      txt.textContent=key.label; svg.appendChild(txt);
    }
  });
  BK.forEach(bk=>{
    const x=(bk.ai+1)*KW-BKW/2;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x);rect.setAttribute('y',0);
    rect.setAttribute('width',BKW);rect.setAttribute('height',BKH);
    rect.setAttribute('rx',2);rect.setAttribute('fill','#1c1c1e');
    rect.setAttribute('stroke','#0a0a0a');rect.setAttribute('stroke-width','0.5');
    svg.appendChild(rect);
  });
  container.appendChild(svg);
}

function handlePianoClick(clicked,target,svg){
  if(state.answered) return;
  state.answered=true; state.total++;
  const correct=clicked===target;
  svg.querySelectorAll('rect[data-label]').forEach(rect=>{
    const lbl=rect.getAttribute('data-label');
    if(lbl===clicked) rect.setAttribute('fill',correct?'#52b788':'#e07070');
    else if(!correct&&lbl===target) rect.setAttribute('fill','#52b788');
  });
  const pN=TREBLE.find(n=>n.label===clicked);
  const pT=TREBLE.find(n=>n.label===target);
  if(correct){state.score+=10+state.streak*2;state.streak++;soundCorrect(pN?pN.name:'');showFeedback('✓ '+streakMsg());}
  else{state.streak=0;soundWrong();if(pT)soundReveal(pT.name);showFeedback('La bonne touche est en vert !');}
  updateScore();
  document.getElementById('next-btn').style.display='inline-block';
  scrollToBottom();
}

// ── GÉNÉRATION ────────────────────────────────────────────────────────────────
function makeQ(){
  const lvl=state.level;
  if(lvl===0){const clef=Math.random()<0.5?'treble':'bass';const pool=clef==='treble'?TREBLE:BASS;const n=rand(pool);return{type:'single',clef,notes:[n],answers:[n.label]};}
  if(lvl===1){const clef=Math.random()<0.5?'treble':'bass';const pool=clef==='treble'?TREBLE:BASS;const count=2+Math.floor(Math.random()*2),picked=[];while(picked.length<count){const n=rand(pool);if(!picked.find(p=>p.name===n.name))picked.push(n);}picked.sort((a,b)=>a.pos-b.pos);return{type:'multi',clef,notes:picked};}
  if(lvl===2){const n=rand(TREBLE);return{type:'piano',note:n};}
  if(lvl===3){const clef=Math.random()<0.5?'treble':'bass';const pool=clef==='treble'?TREBLE:BASS;const n=rand(pool);return{type:'place',targetNote:n,clef};}
  const n=rand(TREBLE);return{type:'ear',note:n};
}

// ── INTERFACE ─────────────────────────────────────────────────────────────────
function buildUI(q){
  document.getElementById('staff-container').innerHTML='';
  document.getElementById('answer-section').innerHTML='';
  if(q.type==='single'){
    addHStaff(q.clef,cv=>renderHStaff(cv,q.notes,q.clef,null));
    addNoteGrid(document.getElementById('answer-section'),q.answers,(c,g)=>resolveAnswer(c,q.answers,g,true));
  } else if(q.type==='multi'){
    addHStaff(q.clef,cv=>renderHStaffChord(cv,q.notes,q.clef,null));
    const sec=document.getElementById('answer-section');
    q.notes.forEach((note,i)=>{
      addSubLabel(sec,'Note '+(i+1)+' de bas en haut');
      addNoteGrid(sec,[note.label],(c,g)=>resolveAnswer(c,[note.label],g,i===q.notes.length-1));
    });
  } else if(q.type==='piano'){
    addHStaff('treble',cv=>renderHStaff(cv,[q.note],'treble',null));
    buildPianoKeys(document.getElementById('answer-section'),q.note.label,false);
  } else if(q.type==='ear'){
    const sc=document.getElementById('staff-container');
    const refDiv=document.createElement('div');refDiv.style.cssText='text-align:center;margin-bottom:10px;';
    const refBtn=document.createElement('button');refBtn.textContent='🎵 Do de référence';
    refBtn.style.cssText='font-family:DM Sans,sans-serif;font-size:13px;font-weight:400;background:#242426;color:#a09a90;border:1px solid #2e2e30;border-radius:20px;padding:8px 18px;cursor:pointer;touch-action:manipulation;';
    refBtn.addEventListener('click',()=>playNote('Do4',0.8));
    refDiv.appendChild(refBtn); sc.appendChild(refDiv);
    const hint=document.createElement('div');hint.style.cssText='text-align:center;margin-bottom:16px;';
    const playBtn=document.createElement('button');playBtn.textContent='▶ Écouter la note';
    playBtn.style.cssText='font-family:Syne,sans-serif;font-size:15px;font-weight:700;background:#e8e4dc;color:#1c1c1e;border:none;border-radius:28px;padding:14px 32px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);touch-action:manipulation;';
    playBtn.addEventListener('click',()=>playNote(q.note.name,1.2));
    hint.appendChild(playBtn); sc.appendChild(hint);
    buildPianoKeys(document.getElementById('answer-section'),q.note.label,false);
    setTimeout(()=>playNote(q.note.name,1.2),400);
  } else if(q.type==='place'){
    buildVerticalStaff(document.getElementById('staff-container'),q);
  }
}

function addHStaff(clef,renderFn){
  const c=document.getElementById('staff-container');
  const badge=document.createElement('div'); badge.className='clef-badge';
  const isTreble=clef==='treble';
  badge.innerHTML=`<span class="clef-symbol">${isTreble?'𝄞':'𝄢'}</span>${isTreble?'Clé de Sol — main droite':'Clé de Fa — main gauche'}`;
  c.appendChild(badge);
  const cv=document.createElement('canvas'); cv.className='staff-canvas'; c.appendChild(cv);
  requestAnimationFrame(()=>setTimeout(()=>renderFn(cv),20));
}

function addSubLabel(parent,text){
  const d=document.createElement('div');d.className='sub-label';d.textContent=text;parent.appendChild(d);
}

function addNoteGrid(parent,correctAnswers,onChoose){
  const grid=document.createElement('div');grid.className='note-grid';
  ALL_LABELS.forEach(l=>{
    const btn=document.createElement('button');btn.className='note-btn';btn.textContent=l;
    btn.addEventListener('touchstart',()=>{},{passive:true});
    btn.onclick=()=>{if(!btn.disabled)onChoose(l,grid);};
    grid.appendChild(btn);
  });
  parent.appendChild(grid);
}

function resolveAnswer(chosen,correctAnswers,grid,showNext){
  const correct=correctAnswers.includes(chosen);
  grid.querySelectorAll('.note-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===chosen)b.classList.add(correct?'correct':'wrong');
    if(!correct&&correctAnswers.includes(b.textContent))b.classList.add('reveal');
  });
  const notePool=state.currentQ&&state.currentQ.clef==='bass'?BASS:TREBLE;
  const noteObj=state.currentQ?(state.currentQ.notes||[state.currentQ.note]).find(n=>n&&n.label===chosen):null;
  const correctNoteObj=notePool.find(n=>correctAnswers.includes(n.label));
  if(correct){
    if(!state.answered){state.score+=10+state.streak*2;state.streak++;}
    soundCorrect(noteObj?noteObj.name:(correctNoteObj?correctNoteObj.name:''));
    showFeedback('✓ '+streakMsg());
  } else {
    state.streak=0; soundWrong();
    if(correctNoteObj)soundReveal(correctNoteObj.name);
    showFeedback('La bonne note : '+correctAnswers.join(', '));
  }
  state.answered=true; updateScore();
  if(showNext){document.getElementById('next-btn').style.display='inline-block';scrollToBottom();}
}

// ── UTILITAIRES ───────────────────────────────────────────────────────────────
function showFeedback(msg){document.getElementById('feedback-text').textContent=msg;}
function streakMsg(){
  if(state.streak>bestStreak)bestStreak=state.streak;
  if(state.streak>=5)return '🔥 En feu ! +'+(10+state.streak*2)+'pts';
  if(state.streak>=3)return '⭐ Belle série ! +'+(10+state.streak*2)+'pts';
  return 'Correct ! +'+(10+state.streak*2)+'pts';
}
function updateScore(){
  document.getElementById('score-display').textContent=state.score;
  document.getElementById('streak-display').textContent=state.streak;
  document.getElementById('progress-bar').style.width=Math.min(100,(state.score/300)*100)+'%';
}
function scrollToBottom(){setTimeout(()=>{const el=document.getElementById('main-scroll');el.scrollTo({top:el.scrollHeight,behavior:'smooth'});},80);}

function nextQuestion(){
  state.answered=false; showFeedback('');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('main-scroll').scrollTo({top:0,behavior:'instant'});
  const q=makeQ(); state.currentQ=q;
  const labels={0:'Quelle est cette note ?',1:'Identifie chaque note de bas en haut',2:'Trouve la note sur le clavier',3:'Place la note sur la portée',4:'Quelle note entends-tu ?'};
  document.getElementById('question-label').textContent=labels[state.level]||'';
  buildUI(q);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function buildLevelCards(){
  const container=document.getElementById('home-level-cards');
  container.innerHTML='';
  LEVEL_META.forEach((meta,i)=>{
    const card=document.createElement('div');card.className='level-card';
    card.innerHTML=`<div class="level-card-icon">${meta.icon}</div><div class="level-card-text"><div class="level-card-name">${meta.name}</div><div class="level-card-desc">${meta.desc}</div></div><div class="level-card-arrow">›</div>`;
    card.onclick=()=>startApp(i);
    container.appendChild(card);
  });
}

function showHome(){
  if(state.score>0)lastScore=state.score;
  state.score=0;state.streak=0;state.total=0;state.answered=false;
  document.getElementById('home-total-score').textContent=lastScore;
  document.getElementById('home-best-streak').textContent=bestStreak;
  document.getElementById('home-screen').classList.remove('hidden');
  document.getElementById('level-screen').classList.add('hidden');
  document.getElementById('app').style.display='none';
  document.getElementById('home-back-btn').style.display='none';
}

function showLevelScreen(){
  buildLevelCards();
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('level-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

function startApp(lvl){
  state.level=lvl;
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('level-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('home-back-btn').style.display='block';
  document.querySelectorAll('.level-tab').forEach((t,i)=>t.classList.toggle('active',i===lvl));
  nextQuestion();
}

function buildLevelTabs(){
  const tabs=document.getElementById('level-tabs');
  LEVELS.forEach(lvl=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(lvl.id===state.level?' active':'');
    btn.textContent=lvl.label;btn.title=lvl.desc;
    btn.onclick=()=>{
      state.level=lvl.id;state.answered=false;
      document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      showFeedback('');document.getElementById('next-btn').style.display='none';
      nextQuestion();
    };
    tabs.appendChild(btn);
  });
}

buildLevelTabs();
document.getElementById('home-start-btn').addEventListener('click',()=>showLevelScreen());
document.getElementById('home-back-btn').addEventListener('click',()=>showHome());
showHome();
</script>
