<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>♪ Lire la Portée</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --bg2: #f2ede4;
    --bg3: #e8e0d0;
    --text: #1a1612;
    --text2: #5a5248;
    --text3: #8a7e70;
    --accent: #7a5c38;
    --accent2: #b8945a;
    --line: #c8bfb0;
    --correct: #2d6a4f;
    --correct-bg: #d8f3dc;
    --wrong: #9b2226;
    --wrong-bg: #fde8e8;
    --reveal-bg: #fff3cd;
    --reveal: #7a5200;
    --staff-line: #4a3f35;
    --note-col: #1a1612;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1612;
      --bg2: #231f1a;
      --bg3: #2e2820;
      --text: #f0e8d8;
      --text2: #b0a090;
      --text3: #7a6e60;
      --accent: #c8945a;
      --accent2: #e0b878;
      --line: #3a3028;
      --correct: #52b788;
      --correct-bg: #1b4332;
      --wrong: #e07070;
      --wrong-bg: #3b1212;
      --reveal-bg: #3a2e00;
      --reveal: #ffd166;
      --staff-line: #c0b0a0;
      --note-col: #f0e8d8;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--line);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .pills { display: flex; gap: 8px; }
  .pill {
    font-size: 12px;
    color: var(--text2);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Lora', serif;
  }
  .pill strong { color: var(--text); }

  /* ── LEVEL TABS ── */
  .level-tabs {
    display: flex;
    overflow-x: auto;
    background: var(--bg2);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .level-tabs::-webkit-scrollbar { display: none; }
  .level-tab {
    padding: 9px 13px;
    font-family: 'Lora', serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .level-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── PROGRESS ── */
  .progress-wrap {
    height: 2px;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent2);
    transition: width 0.4s ease;
  }

  /* ── MAIN SCROLL AREA ── */
  .main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .question-label {
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    font-style: italic;
    line-height: 1.4;
  }

  .staff-label {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    margin-bottom: 2px;
    font-style: italic;
  }

  canvas.staff-canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
  }

  /* ── NOTE BUTTONS ── */
  .answer-section { display: flex; flex-direction: column; gap: 8px; }

  .sub-label {
    font-size: 11px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 2px;
  }

  .note-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .note-btn {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0;
    height: 46px;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    touch-action: manipulation;
  }
  .note-btn:active { transform: scale(0.94); }
  .note-btn.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .note-btn.wrong   { background: var(--wrong-bg);   border-color: var(--wrong);   color: var(--wrong); }
  .note-btn.reveal  { background: var(--reveal-bg);  border-color: var(--reveal);  color: var(--reveal); }
  .note-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback-area {
    text-align: center;
    min-height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .feedback-text {
    font-size: 13px;
    font-style: italic;
    color: var(--text2);
    line-height: 1.4;
  }
  .next-btn {
    display: none;
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 24px;
    padding: 11px 28px;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
    touch-action: manipulation;
  }
  .next-btn:active { transform: scale(0.96); }

  /* ── PIANO SVG ── */
  .piano-hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    font-style: italic;
    margin-bottom: 4px;
  }

  /* ── PLACE INSTRUCTION ── */
  .place-instr {
    font-size: 14px;
    color: var(--text);
    text-align: center;
    line-height: 1.5;
  }
  .place-instr strong { color: var(--accent2); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>♪ Lire la Portée</h1>
    <div class="pills">
      <div class="pill">Score <strong id="score-display">0</strong></div>
      <div class="pill">🔥 <strong id="streak-display">0</strong></div>
    </div>
  </div>
  <div class="level-tabs" id="level-tabs"></div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>

  <div class="main" id="main-scroll">
    <div class="question-label" id="question-label"></div>
    <div id="staff-container"></div>
    <div class="answer-section" id="answer-section"></div>
    <div class="feedback-area">
      <div class="feedback-text" id="feedback-text"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>
  </div>
</div>

<script>
// ── THÉORIE ──────────────────────────────────────────────────────────────────
// Positions sur la portée (de bas en haut) :
// pos 1=ligne1(bas) 1.5=espace 2=ligne2 2.5=espace 3=ligne3 3.5=espace 4=ligne4 4.5=espace 5=ligne5(haut)
// pos 0=ligne reposée basse  pos 6=ligne reposée haute
//
// CLÉ DE SOL : spirale sur ligne 2 = Sol4
// pos0=Do4  pos0.5=Ré4  pos1=Mi4  pos1.5=Fa4  pos2=Sol4  pos2.5=La4
// pos3=Si4  pos3.5=Do5  pos4=Ré5  pos4.5=Mi5  pos5=Fa5   pos5.5=Sol5  pos6=La5
//
// CLÉ DE FA : points sur ligne 4 = Fa3
// pos0=Mi2  pos0.5=Fa2  pos1=Sol2  pos1.5=La2  pos2=Si2   pos2.5=Do3
// pos3=Ré3  pos3.5=Mi3  pos4=Fa3   pos4.5=Sol3 pos5=La3   pos5.5=Si3   pos6=Do4

const STAFF_TOP = 28;
const LINE_SP = 11;
const NOTE_R = 6;
const STAFF_LEFT = 58;
const CANVAS_H = 108;
const DPR = window.devicePixelRatio || 1;

function posToY(pos){ return STAFF_TOP + (5 - pos) * LINE_SP; }

const TREBLE_NOTES = [
  {name:'Do4', label:'Do',  pos:0  },
  {name:'Ré4', label:'Ré',  pos:0.5},
  {name:'Mi4', label:'Mi',  pos:1  },
  {name:'Fa4', label:'Fa',  pos:1.5},
  {name:'Sol4',label:'Sol', pos:2  },
  {name:'La4', label:'La',  pos:2.5},
  {name:'Si4', label:'Si',  pos:3  },
  {name:'Do5', label:'Do',  pos:3.5},
  {name:'Ré5', label:'Ré',  pos:4  },
  {name:'Mi5', label:'Mi',  pos:4.5},
  {name:'Fa5', label:'Fa',  pos:5  },
  {name:'Sol5',label:'Sol', pos:5.5},
  {name:'La5', label:'La',  pos:6  },
];
const BASS_NOTES = [
  {name:'Mi2', label:'Mi',  pos:0  },
  {name:'Fa2', label:'Fa',  pos:0.5},
  {name:'Sol2',label:'Sol', pos:1  },
  {name:'La2', label:'La',  pos:1.5},
  {name:'Si2', label:'Si',  pos:2  },
  {name:'Do3', label:'Do',  pos:2.5},
  {name:'Ré3', label:'Ré',  pos:3  },
  {name:'Mi3', label:'Mi',  pos:3.5},
  {name:'Fa3', label:'Fa',  pos:4  },
  {name:'Sol3',label:'Sol', pos:4.5},
  {name:'La3', label:'La',  pos:5  },
  {name:'Si3', label:'Si',  pos:5.5},
  {name:'Do4', label:'Do',  pos:6  },
];
const ALL_LABELS = ['Do','Ré','Mi','Fa','Sol','La','Si'];
const LEVELS = [
  {id:0,label:'① Sol',    desc:'Note simple, clé de Sol'},
  {id:1,label:'② Fa',     desc:'Note simple, clé de Fa'},
  {id:2,label:'③ 2 clés', desc:'Une note dans chaque clé'},
  {id:3,label:'④ Accord', desc:'Plusieurs notes'},
  {id:4,label:'⑤ Piano',  desc:'Placer sur le clavier'},
  {id:5,label:'⑥ Placer', desc:'Placer sur la portée'},
];

let state = {level:0, score:0, streak:0, total:0, answered:false, currentQ:null};
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function dk(){ return window.matchMedia('(prefers-color-scheme:dark)').matches; }

// ── DESSIN ──────────────────────────────────────────────────────────────────

function initCanvas(canvas){
  const W = canvas.parentElement.clientWidth || 340;
  canvas.width = W * DPR;
  canvas.height = CANVAS_H * DPR;
  canvas.style.height = CANVAS_H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  return {ctx, W};
}

function drawStaffLines(ctx, W){
  const col = dk() ? '#c0b0a0' : '#4a3f35';
  ctx.strokeStyle = col; ctx.lineWidth = 0.8;
  [1,2,3,4,5].forEach(p => {
    const y = posToY(p);
    ctx.beginPath(); ctx.moveTo(STAFF_LEFT, y); ctx.lineTo(W-12, y); ctx.stroke();
  });
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(STAFF_LEFT, posToY(5)); ctx.lineTo(STAFF_LEFT, posToY(1)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-12, posToY(5)); ctx.lineTo(W-12, posToY(1)); ctx.stroke();
  return col;
}

function drawClef(ctx, clef, col){
  ctx.fillStyle = col;
  if(clef === 'treble'){ ctx.font = '60px serif'; ctx.fillText('𝄞', 2, posToY(1)+14); }
  else                 { ctx.font = '46px serif'; ctx.fillText('𝄢', 6, posToY(4)+5);  }
}

function drawNote(ctx, pos, color, x){
  const y = posToY(pos);
  const lc = dk() ? '#888' : '#5a4a35';
  // Lignes de reposée
  ctx.strokeStyle = lc; ctx.lineWidth = 1;
  if(pos <= 0){ const ly=posToY(0); ctx.beginPath(); ctx.moveTo(x-NOTE_R-4,ly); ctx.lineTo(x+NOTE_R+4,ly); ctx.stroke(); }
  if(pos >= 6){ const ly=posToY(6); ctx.beginPath(); ctx.moveTo(x-NOTE_R-4,ly); ctx.lineTo(x+NOTE_R+4,ly); ctx.stroke(); }
  // Queue
  const up = pos < 3.5;
  ctx.strokeStyle = color; ctx.lineWidth = 1.4;
  if(up){ ctx.beginPath(); ctx.moveTo(x+NOTE_R-1,y); ctx.lineTo(x+NOTE_R-1,y-30); ctx.stroke(); }
  else  { ctx.beginPath(); ctx.moveTo(x-NOTE_R+1,y); ctx.lineTo(x-NOTE_R+1,y+30); ctx.stroke(); }
  // Tête
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x, y, NOTE_R, NOTE_R*0.72, -0.25, 0, Math.PI*2); ctx.fill();
}

function renderStaff(canvas, notes, clef, colors){
  const {ctx, W} = initCanvas(canvas);
  ctx.clearRect(0,0,W,CANVAS_H);
  const col = drawStaffLines(ctx, W);
  drawClef(ctx, clef, col);
  const aStart = 115, aEnd = W - 24;
  notes.forEach((note, i) => {
    const x = notes.length===1 ? aStart+(aEnd-aStart)/2 : aStart + i*(aEnd-aStart)/Math.max(notes.length-1,1);
    const c = (colors && colors[i]) ? colors[i] : (dk() ? '#f0e8d8' : '#1a1612');
    drawNote(ctx, note.pos, c, x);
  });
}

function renderEmptyStaff(canvas, clef){
  const {ctx, W} = initCanvas(canvas);
  ctx.clearRect(0,0,W,CANVAS_H);
  const col = drawStaffLines(ctx, W);
  drawClef(ctx, clef, col);
}

// ── GÉNÉRATION ──────────────────────────────────────────────────────────────

function makeQ(){
  const lvl = state.level;
  if(lvl===0){ const n=rand(TREBLE_NOTES); return {type:'single',clef:'treble',notes:[n],answers:[n.label]}; }
  if(lvl===1){ const n=rand(BASS_NOTES);   return {type:'single',clef:'bass',  notes:[n],answers:[n.label]}; }
  if(lvl===2){ const t=rand(TREBLE_NOTES),b=rand(BASS_NOTES); return {type:'two_clefs',treble:t,bass:b}; }
  if(lvl===3){
    const count=2+Math.floor(Math.random()*2), picked=[];
    while(picked.length<count){ const n=rand(TREBLE_NOTES); if(!picked.find(p=>p.name===n.name)) picked.push(n); }
    picked.sort((a,b)=>a.pos-b.pos);
    return {type:'multi',clef:'treble',notes:picked};
  }
  if(lvl===4){ const n=rand(TREBLE_NOTES); return {type:'piano',note:n}; }
  const n=rand(TREBLE_NOTES); return {type:'place',targetNote:n};
}

// ── INTERFACE ────────────────────────────────────────────────────────────────

function buildUI(q){
  document.getElementById('staff-container').innerHTML = '';
  document.getElementById('answer-section').innerHTML = '';

  if(q.type==='single'){
    addStaff(q.clef==='treble'?'Clé de Sol — main droite':'Clé de Fa — main gauche',
      cv=>renderStaff(cv,q.notes,q.clef,null));
    addNoteGrid(document.getElementById('answer-section'),q.answers,
      (chosen,grid)=>resolveAnswer(chosen,q.answers,grid,true));

  } else if(q.type==='two_clefs'){
    addStaff('Clé de Sol (main droite)', cv=>renderStaff(cv,[q.treble],'treble',null));
    addStaff('Clé de Fa (main gauche)',  cv=>renderStaff(cv,[q.bass],'bass',null));
    const sec=document.getElementById('answer-section');
    addSubLabel(sec,'Note clé de Sol :');
    addNoteGrid(sec,[q.treble.label],(c,g)=>resolveAnswer(c,[q.treble.label],g,false));
    addSubLabel(sec,'Note clé de Fa :');
    addNoteGrid(sec,[q.bass.label],  (c,g)=>resolveAnswer(c,[q.bass.label],g,true));

  } else if(q.type==='multi'){
    addStaff(`${q.notes.length} notes — de bas en haut`, cv=>renderStaff(cv,q.notes,q.clef,null));
    const sec=document.getElementById('answer-section');
    q.notes.forEach((note,i)=>{
      addSubLabel(sec,`Note ${i+1} :`);
      addNoteGrid(sec,[note.label],(c,g)=>resolveAnswer(c,[note.label],g,i===q.notes.length-1));
    });

  } else if(q.type==='piano'){
    addStaff('', cv=>renderStaff(cv,[q.note],'treble',null));
    buildPiano(document.getElementById('answer-section'), q);

  } else if(q.type==='place'){
    const sc=document.getElementById('staff-container');
    const instr=document.createElement('div'); instr.className='place-instr';
    instr.innerHTML=`Touche la position de <strong>${q.targetNote.label}</strong> sur la portée`;
    sc.appendChild(instr);
    const cv=document.createElement('canvas'); cv.className='staff-canvas'; cv.style.cursor='crosshair';
    sc.appendChild(cv);
    setTimeout(()=>renderEmptyStaff(cv,'treble'),30);
    cv.addEventListener('touchstart', e=>{e.preventDefault(); handlePlaceTouch(e,cv,q);},{passive:false});
    cv.addEventListener('click', e=>handlePlaceClick(e,cv,q));
  }
}

function addStaff(labelText, renderFn){
  const c=document.getElementById('staff-container');
  if(labelText){ const l=document.createElement('div'); l.className='staff-label'; l.textContent=labelText; c.appendChild(l); }
  const cv=document.createElement('canvas'); cv.className='staff-canvas'; c.appendChild(cv);
  setTimeout(()=>renderFn(cv),30);
}

function addSubLabel(parent,text){
  const d=document.createElement('div'); d.className='sub-label'; d.textContent=text; parent.appendChild(d);
}

function addNoteGrid(parent, correctAnswers, onChoose){
  const grid=document.createElement('div'); grid.className='note-grid';
  ALL_LABELS.forEach(l=>{
    const btn=document.createElement('button'); btn.className='note-btn'; btn.textContent=l;
    btn.addEventListener('touchstart',()=>{},{passive:true});
    btn.onclick=()=>{ if(!btn.disabled) onChoose(l,grid); };
    grid.appendChild(btn);
  });
  parent.appendChild(grid);
}

function resolveAnswer(chosen, correctAnswers, grid, showNext){
  const correct=correctAnswers.includes(chosen);
  grid.querySelectorAll('.note-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===chosen) b.classList.add(correct?'correct':'wrong');
    if(!correct && correctAnswers.includes(b.textContent)) b.classList.add('reveal');
  });
  if(correct){ if(!state.answered){state.score+=10+state.streak*2; state.streak++;} showFeedback('✓ '+streakMsg()); }
  else       { state.streak=0; showFeedback('La bonne note : '+correctAnswers.join(', ')); }
  state.answered=true;
  updateScore();
  if(showNext){ document.getElementById('next-btn').style.display='inline-block'; scrollToBottom(); }
}

// ── PIANO ────────────────────────────────────────────────────────────────────

function buildPiano(container, q){
  const hint=document.createElement('div'); hint.className='piano-hint';
  hint.textContent='Touche la bonne note sur le piano'; container.appendChild(hint);

  const WHITE_KEYS=[
    {label:'Do',oct:4},{label:'Ré',oct:4},{label:'Mi',oct:4},
    {label:'Fa',oct:4},{label:'Sol',oct:4},{label:'La',oct:4},{label:'Si',oct:4},
    {label:'Do',oct:5},{label:'Ré',oct:5},{label:'Mi',oct:5},
    {label:'Fa',oct:5},{label:'Sol',oct:5},{label:'La',oct:5},{label:'Si',oct:5},
  ];
  const BLACK_KEYS=[
    {label:'Do#',afterIdx:0},{label:'Ré#',afterIdx:1},
    {label:'Fa#',afterIdx:3},{label:'Sol#',afterIdx:4},{label:'La#',afterIdx:5},
    {label:'Do#',afterIdx:7},{label:'Ré#',afterIdx:8},
    {label:'Fa#',afterIdx:10},{label:'Sol#',afterIdx:11},{label:'La#',afterIdx:12},
  ];

  const KW=26, KH=72, BKW=17, BKH=44;
  const totalW=WHITE_KEYS.length*KW;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${totalW} ${KH}`);
  svg.style.cssText='width:100%;height:auto;display:block;border-radius:6px;overflow:hidden;';
  const target=q.note.label;

  WHITE_KEYS.forEach((key,i)=>{
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',i*KW+0.5); rect.setAttribute('y',0.5);
    rect.setAttribute('width',KW-1); rect.setAttribute('height',KH-1);
    rect.setAttribute('rx',3); rect.setAttribute('fill', dk()?'#e8e0d0':'white');
    rect.setAttribute('stroke','#bbb'); rect.setAttribute('stroke-width','0.5');
    rect.setAttribute('data-label',key.label);
    rect.style.cursor='pointer';
    rect.addEventListener('click',()=>handlePianoClick(key.label,target,svg));

    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',i*KW+KW/2); txt.setAttribute('y',KH-5);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('font-size','6');
    txt.setAttribute('fill','#aaa'); txt.setAttribute('pointer-events','none');
    txt.textContent=key.label;
    svg.appendChild(rect); svg.appendChild(txt);
  });

  BLACK_KEYS.forEach(bk=>{
    const x=(bk.afterIdx+1)*KW - BKW/2;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x); rect.setAttribute('y',0);
    rect.setAttribute('width',BKW); rect.setAttribute('height',BKH);
    rect.setAttribute('rx',2); rect.setAttribute('fill', dk()?'#1a1612':'#2c2c2c');
    rect.setAttribute('stroke','#111'); rect.setAttribute('stroke-width','0.5');
    svg.appendChild(rect);
  });

  container.appendChild(svg);
}

function handlePianoClick(clicked, target, svg){
  if(state.answered) return;
  state.answered=true; state.total++;
  const correct=clicked===target;
  svg.querySelectorAll('rect[data-label]').forEach(rect=>{
    const lbl=rect.getAttribute('data-label');
    if(lbl===clicked)       rect.setAttribute('fill', correct?'#52b788':'#e07070');
    else if(!correct && lbl===target) rect.setAttribute('fill','#f0a500');
  });
  if(correct){ state.score+=10+state.streak*2; state.streak++; showFeedback('✓ '+streakMsg()); }
  else       { state.streak=0; showFeedback(`Touche ${target} en orange !`); }
  updateScore();
  document.getElementById('next-btn').style.display='inline-block';
  scrollToBottom();
}

// ── PLACER SUR LA PORTÉE ─────────────────────────────────────────────────────

function getClickPosOnCanvas(e, canvas){
  const rect=canvas.getBoundingClientRect();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return (clientY - rect.top) * (CANVAS_H / rect.height);
}

function handlePlaceTouch(e, canvas, q){ handlePlaceEvent(e, canvas, q, true); }
function handlePlaceClick(e, canvas, q){ handlePlaceEvent(e, canvas, q, false); }

function handlePlaceEvent(e, canvas, q, isTouch){
  if(state.answered) return;
  if(isTouch && e.touches.length===0) return;
  const clickY = getClickPosOnCanvas(e, canvas);
  const rawPos = 5 - (clickY - STAFF_TOP) / LINE_SP;
  const snapped = Math.round(rawPos * 2) / 2;
  const found = TREBLE_NOTES.find(n=>n.pos===snapped);
  if(!found){ showFeedback('Touche une ligne ou un espace !'); return; }

  state.answered=true; state.total++;
  // ✅ On accepte TOUS les emplacements du même label (Do4 et Do5 sont tous deux des Do)
  const correct = found.label === q.targetNote.label;
  const col = correct ? '#52b788' : '#e07070';

  if(correct){
    renderStaff(canvas,[found],'treble',[col]);
    state.score+=15+state.streak*2; state.streak++; showFeedback('✓ '+streakMsg());
  } else {
    renderStaff(canvas,[found,q.targetNote],'treble',[col,'#f0a500']);
    state.streak=0; showFeedback(`${q.targetNote.label} est indiqué en orange.`);
  }
  updateScore();
  document.getElementById('next-btn').style.display='inline-block';
  scrollToBottom();
}

// ── UTILITAIRES ──────────────────────────────────────────────────────────────

function showFeedback(msg){ document.getElementById('feedback-text').textContent=msg; }

function streakMsg(){
  if(state.streak>=5) return '🔥 En feu ! +' + (10+state.streak*2) + 'pts';
  if(state.streak>=3) return '⭐ Série ! +' + (10+state.streak*2) + 'pts';
  return 'Correct ! +' + (10+state.streak*2) + 'pts';
}

function updateScore(){
  document.getElementById('score-display').textContent=state.score;
  document.getElementById('streak-display').textContent=state.streak;
  document.getElementById('progress-bar').style.width=Math.min(100,(state.score/300)*100)+'%';
}

function scrollToBottom(){
  setTimeout(()=>{
    const el=document.getElementById('main-scroll');
    el.scrollTo({top:el.scrollHeight, behavior:'smooth'});
  }, 80);
}

function nextQuestion(){
  state.answered=false;
  showFeedback('');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('main-scroll').scrollTo({top:0,behavior:'instant'});
  const q=makeQ(); state.currentQ=q;
  const labels={
    0:'Quelle est cette note ? (Clé de Sol)',
    1:'Quelle est cette note ? (Clé de Fa)',
    2:'Identifie les deux notes',
    3:'Identifie chaque note de bas en haut',
    4:'Touche la bonne note sur le piano',
    5:'Touche la bonne position sur la portée',
  };
  document.getElementById('question-label').textContent=labels[state.level]||'';
  buildUI(q);
}

function buildLevelTabs(){
  const tabs=document.getElementById('level-tabs');
  LEVELS.forEach(lvl=>{
    const btn=document.createElement('button');
    btn.className='level-tab'+(lvl.id===state.level?' active':'');
    btn.textContent=lvl.label; btn.title=lvl.desc;
    btn.onclick=()=>{
      state.level=lvl.id; state.answered=false;
      document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      showFeedback(''); document.getElementById('next-btn').style.display='none';
      nextQuestion();
    };
    tabs.appendChild(btn);
  });
}

buildLevelTabs();
nextQuestion();
</script>
